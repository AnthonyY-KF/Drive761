<!DOCTYPE html>
<html>
<head>
    <title>Drive761</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#111827;
            color:white;
        }

        .header{
            background:#0057B8;
            padding:20px;
            text-align:center;
        }

        .header h1{
            margin:0;
            font-size:40px;
        }

        .header p{
            margin-top:10px;
        }

        .container{
            max-width:900px;
            margin:auto;
            padding:20px;
        }

        .card{
            background:#1F2937;
            padding:20px;
            margin-bottom:15px;
            border-radius:12px;
            cursor:pointer;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-3px);
            background:#374151;
        }

        h2{
            margin-top:0;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>🚗 Drive761</h1>
    <p>Driving Performance. Rewarding Success.</p>
</div>

<div class="container">

    <div class="card">
        🚀 Launch Campaign
    </div>

    <div class="card">
        📢 Campaigns
    </div>

    <div class="card">
        🎮 Games
    </div>

    <div class="card">
        🏆 Leaderboards
    </div>

    <div class="card">
        📊 Reports
    </div>

    <div class="card">
        🏢 Centres
    </div>

    <div class="card">
        ⚙️ Administration
    </div>

</div>

</body>
</html>
